<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이 성장 기록</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; }
.app { max-width: 480px; margin: 0 auto; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.5rem; padding-top: 1rem; }
.header h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
.header p { font-size: 13px; color: #666; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; background: #ede9e0; border-radius: 12px; padding: 4px; }
.tab { flex: 1; padding: 7px 2px; border: none; background: transparent; border-radius: 8px; font-size: 12px; font-weight: 400; color: #666; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.tab.active { background: #fff; color: #1a1a1a; font-weight: 500; border: 0.5px solid rgba(0,0,0,0.1); }
.section { display: none; }
.section.active { display: block; }

.date-label { font-size: 13px; color: #666; margin-bottom: 1rem; text-align: center; }
.category-cards { display: flex; flex-direction: column; gap: 12px; }
.cat-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
.cat-card:hover { border-color: rgba(0,0,0,0.2); }
.cat-header { display: flex; align-items: center; gap: 10px; }
.cat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.cat-icon.book { background: #EEF2FF; }
.cat-icon.video { background: #FEF3C7; }
.cat-icon.daily { background: #ECFDF5; }
.cat-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.cat-sub { font-size: 12px; color: #666; margin-top: 2px; }
.cat-arrow { margin-left: auto; color: #aaa; font-size: 16px; }
.cat-preview { margin-top: 10px; display: none; }
.cat-preview.has-record { display: flex; gap: 8px; align-items: center; }
.preview-thumb { width: 48px; height: 48px; border-radius: 6px; background: #ede9e0; border: 0.5px solid rgba(0,0,0,0.1); flex-shrink: 0; overflow: hidden; }
.preview-memo { font-size: 13px; color: #666; line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* 모달 */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 1.5rem 1.25rem; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 0 auto 1.25rem; }
.modal-title { font-size: 17px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.modal-date-label { font-size: 12px; color: #666; margin-bottom: 1.25rem; }
.photo-upload-area { border: 1.5px dashed rgba(0,0,0,0.2); border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; margin-bottom: 1rem; position: relative; transition: border-color 0.15s; }
.photo-upload-area:hover { border-color: rgba(0,0,0,0.35); }
.photo-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 1rem; }
.photo-thumb { aspect-ratio: 1; border-radius: 8px; width: 100%; background: #ede9e0; position: relative; overflow: hidden; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,0.55); border-radius: 50%; border: none; cursor: pointer; color: #fff; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; }
.memo-area { width: 100%; min-height: 100px; padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fff; resize: none; margin-bottom: 1rem; }
.memo-area:focus { outline: none; border-color: rgba(0,0,0,0.35); }
.btn-primary { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { width: 100%; padding: 10px; background: transparent; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 14px; color: #666; cursor: pointer; margin-top: 8px; }

/* 달력 */
.calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.cal-nav-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; padding: 4px 10px; border-radius: 8px; }
.cal-nav-btn:hover { background: #ede9e0; }
.cal-month-label { font-size: 16px; font-weight: 500; color: #1a1a1a; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 12px; color: #666; padding: 4px 0; font-weight: 500; }
.cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; padding: 2px; }
.cal-day:hover { background: #ede9e0; }
.cal-day.other-month { opacity: 0.3; cursor: default; }
.cal-day.future { opacity: 0.4; cursor: default; pointer-events: none; }
.cal-day.today .day-num { background: #1a1a1a; color: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.cal-day.selected { background: #ede9e0; }
.day-num { font-size: 13px; color: #1a1a1a; }
.day-dots { display: flex; gap: 2px; margin-top: 2px; }
.dot { width: 5px; height: 5px; border-radius: 50%; }
.dot-book { background: #818CF8; }
.dot-video { background: #F59E0B; }
.dot-daily { background: #10B981; }
.cal-selected-day { margin-top: 1.25rem; }
.day-panel { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
.day-panel-header { padding: 12px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: space-between; }
.day-panel-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.add-record-btn { font-size: 12px; color: #666; background: #f0ede6; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 5px 10px; cursor: pointer; }
.add-record-btn:hover { border-color: rgba(0,0,0,0.2); }
.day-cat-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.06); cursor: pointer; transition: background 0.1s; }
.day-cat-row:last-child { border-bottom: none; }
.day-cat-row:hover { background: #f9f9f7; }
.day-cat-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.day-cat-info { flex: 1; min-width: 0; }
.day-cat-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.day-cat-memo { font-size: 12px; color: #666; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-cat-status { font-size: 12px; color: #aaa; flex-shrink: 0; }
.day-cat-status.done { color: #10B981; }
.day-cat-thumb { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.1); }

/* 카테고리 선택 모달 */
.cat-pick-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
.cat-pick-modal-bg.open { display: flex; }
.cat-pick-modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 1.5rem 1.25rem; }
.cat-pick-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
.cat-pick-date { font-size: 12px; color: #666; margin-bottom: 1.25rem; }
.cat-pick-list { display: flex; flex-direction: column; gap: 8px; }
.cat-pick-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; cursor: pointer; transition: background 0.1s; }
.cat-pick-item:hover { background: #f9f9f7; }
.cpi-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.cpi-label { font-size: 14px; font-weight: 500; color: #1a1a1a; flex: 1; }
.cpi-status { font-size: 12px; }
.cat-pick-cancel { width: 100%; margin-top: 10px; padding: 10px; background: transparent; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 14px; color: #666; cursor: pointer; }

/* 항목별 */
.category-filter { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 20px; font-size: 13px; cursor: pointer; background: #fff; color: #666; transition: all 0.15s; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.all-records { display: flex; flex-direction: column; gap: 12px; }
.all-record-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem; }
.arc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.arc-date { font-size: 12px; color: #666; margin-left: auto; }
.arc-memo { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 8px; }
.arc-photos { display: flex; gap: 6px; flex-wrap: wrap; }
.arc-photo { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; border: 0.5px solid rgba(0,0,0,0.1); }
.record-cat-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 8px; flex-shrink: 0; }
.badge-book { background: #EEF2FF; color: #4338CA; }
.badge-video { background: #FEF3C7; color: #92400E; }
.badge-daily { background: #ECFDF5; color: #065F46; }
.empty-state { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; line-height: 1.8; }

/* ── 한달 보고서 ── */
.report-tab-inner { display: flex; flex-direction: column; gap: 16px; }
.report-month-nav { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 12px 16px; }
.report-month-nav button { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; padding: 2px 8px; border-radius: 6px; }
.report-month-nav button:hover { background: #f0ede6; }
.report-month-display { font-size: 16px; font-weight: 500; color: #1a1a1a; }

/* 통계 */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.stat-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 12px; text-align: center; }
.stat-icon { font-size: 20px; margin-bottom: 4px; }
.stat-count { font-size: 24px; font-weight: 500; color: #1a1a1a; line-height: 1; margin-bottom: 2px; }
.stat-label { font-size: 11px; color: #888; line-height: 1.4; }
.stat-bar-wrap { margin-top: 6px; background: #f0ede6; border-radius: 4px; height: 4px; overflow: hidden; }
.stat-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.bar-book { background: #818CF8; }
.bar-video { background: #F59E0B; }
.bar-daily { background: #10B981; }

/* 사진 스트립 */
.photo-strip-section { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
.section-label { font-size: 12px; font-weight: 500; color: #888; padding: 12px 14px 8px; letter-spacing: 0.03em; }
.cat-photo-group { border-top: 0.5px solid rgba(0,0,0,0.06); }
.cat-photo-group:first-child { border-top: none; }
.cat-photo-label { display: flex; align-items: center; gap: 6px; padding: 10px 14px 4px; font-size: 12px; font-weight: 500; color: #555; }
.cat-photo-label-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-c-book { background: #818CF8; }
.dot-c-video { background: #F59E0B; }
.dot-c-daily { background: #10B981; }
.photo-strip { display: flex; gap: 6px; padding: 0 14px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.photo-strip::-webkit-scrollbar { display: none; }
.strip-photo { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.08); }
.photo-strip-empty { padding: 0 14px 14px; font-size: 13px; color: #aaa; }
.photos-all-empty { padding: 10px 14px 14px; font-size: 13px; color: #aaa; }

/* 보고서 작성 */
.report-write-section { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
.report-write-header { padding: 12px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
.report-write-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.report-write-sub { font-size: 12px; color: #888; margin-top: 2px; }
.report-write-body { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 12px; }
.cat-textarea-group { display: flex; flex-direction: column; gap: 6px; }
.cat-textarea-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: #1a1a1a; }
.report-textarea { width: 100%; min-height: 100px; padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 10px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafaf8; resize: none; line-height: 1.75; }
.report-textarea:focus { outline: none; border-color: rgba(0,0,0,0.3); background: #fff; }
.report-textarea::placeholder { color: #bbb; }
.report-write-actions { display: flex; gap: 8px; margin-top: 2px; }
.report-write-actions button { flex: 1; padding: 11px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.btn-clear { background: #f5f3ef; border: 0.5px solid rgba(0,0,0,0.1); color: #666; }
.btn-clear:hover { border-color: rgba(0,0,0,0.2); }
.btn-save-report { background: #1a1a1a; border: none; color: #fff; font-weight: 500; }
.btn-save-report:hover { opacity: 0.85; }
.no-record-notice { padding: 1.5rem; text-align: center; font-size: 13px; color: #aaa; line-height: 1.7; }
.btn-delete-record { width: 100%; padding: 10px; background: transparent; border: 0.5px solid rgba(220,50,50,0.3); border-radius: 8px; font-size: 13px; color: #c0392b; cursor: pointer; margin-top: 6px; font-family: inherit; }
.btn-delete-record:hover { background: rgba(220,50,50,0.05); }

/* 저장된 보고서 목록 */
.saved-reports-section { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
.saved-report-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.06); cursor: pointer; transition: background 0.1s; }
.saved-report-item:last-child { border-bottom: none; }
.saved-report-item:hover { background: #f9f9f7; }
.sri-left { flex: 1; }
.sri-month { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.sri-meta { font-size: 12px; color: #888; margin-top: 2px; }
.sri-arrow { color: #aaa; font-size: 16px; }
.saved-empty { padding: 1.5rem; text-align: center; font-size: 13px; color: #aaa; }

/* 저장된 보고서 보기 모달 */
.view-report-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; align-items: flex-end; justify-content: center; }
.view-report-bg.open { display: flex; }
.view-report-modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 1.5rem 1.25rem; max-height: 90vh; overflow-y: auto; }
.vr-title { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
.vr-saved-at { font-size: 12px; color: #888; margin-bottom: 1.25rem; }
.vr-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
.vr-stat { background: #f9f9f7; border-radius: 10px; padding: 10px; text-align: center; }
.vr-stat-count { font-size: 20px; font-weight: 500; color: #1a1a1a; }
.vr-stat-label { font-size: 11px; color: #888; margin-top: 2px; }
.vr-photos { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.vr-photo { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 0.5px solid rgba(0,0,0,0.08); }
.vr-report-text { font-size: 14px; color: #333; line-height: 1.8; white-space: pre-wrap; background: #f9f9f7; border-radius: 10px; padding: 14px; margin-bottom: 1rem; }
.vr-edit-btn { width: 100%; padding: 11px; background: #f5f3ef; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; font-size: 14px; color: #1a1a1a; cursor: pointer; margin-bottom: 8px; font-family: inherit; }
.vr-edit-btn:hover { border-color: rgba(0,0,0,0.2); }
.vr-close { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
.vr-delete { width: 100%; padding: 10px; background: transparent; border: 0.5px solid rgba(220,50,50,0.3); border-radius: 8px; font-size: 13px; color: #c0392b; cursor: pointer; margin-top: 8px; font-family: inherit; }

/* 백업/복원 */
.settings-inner { display: flex; flex-direction: column; gap: 16px; padding-top: 0; }
.backup-section { margin-top: 1.5rem; background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
.backup-header { padding: 12px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
.backup-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.backup-sub { font-size: 12px; color: #888; margin-top: 2px; }
.backup-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
.backup-btn { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px; border: 0.5px solid rgba(0,0,0,0.1); background: #fafaf8; cursor: pointer; transition: border-color 0.15s; font-family: inherit; text-align: left; width: 100%; }
.backup-btn:hover { border-color: rgba(0,0,0,0.2); background: #f5f3ef; }
.backup-btn-icon { font-size: 20px; flex-shrink: 0; }
.backup-btn-text { flex: 1; }
.backup-btn-label { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.backup-btn-desc { font-size: 12px; color: #888; margin-top: 1px; }
.backup-btn.import { border-color: rgba(0,0,0,0.1); }
.backup-input { display: none; }

/* ── 인쇄 / PDF 저장 ── */
@media print {
  body > *:not(#print-area) { display: none !important; }
  #print-area {
    display: block !important;
    width: 100% !important;
    background: #fff !important;
    padding: 2rem !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}
.print-page { display: none; }
.print-header { margin-bottom: 24px; }
.print-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.print-meta { font-size: 13px; color: #888; margin-bottom: 16px; }
.print-stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
.print-stat { flex: 1; background: #f9f9f7; border-radius: 10px; padding: 10px 12px; text-align: center; }
.print-stat-count { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.print-stat-label { font-size: 11px; color: #888; margin-top: 2px; }
.print-photos-section { margin-bottom: 20px; }
.print-photos-label { font-size: 15px; font-weight: 700; color: #fff; background: #7C6354; margin-bottom: 12px; padding: 5px 12px; border-radius: 8px; display: inline-block; }
.print-cat-photo-group { margin-bottom: 12px; }
.print-cat-label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
.print-photos-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.print-photo { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 0.5px solid rgba(0,0,0,0.08); }
.print-texts-section { margin-bottom: 20px; }
.print-texts-label { font-size: 15px; font-weight: 700; color: #fff; background: #7C6354; margin-bottom: 14px; padding: 5px 12px; border-radius: 8px; display: inline-block; }
.print-cat-text-group { margin-bottom: 14px; }
.print-cat-text-label { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.print-cat-text-body { font-size: 14px; color: #333; line-height: 1.8; white-space: pre-wrap; background: #f9f9f7; border-radius: 8px; padding: 12px; }
.print-footer { font-size: 11px; color: #bbb; text-align: center; margin-top: 24px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>아이 성장 기록</h1>
    <p id="today-display"></p>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('today', this)">오늘</button>
    <button class="tab" onclick="switchTab('calendar', this)">날짜별</button>
    <button class="tab" onclick="switchTab('bycat', this)">항목별</button>
    <button class="tab" onclick="switchTab('report', this)">한달보고서</button>
    <button class="tab" onclick="switchTab('settings', this)">설정</button>
  </div>

  <!-- 오늘 기록 -->
  <div class="section active" id="tab-today">
    <p class="date-label" id="today-date-label"></p>
    <div class="category-cards">
      <div class="cat-card" onclick="openModal('book', todayKey)">
        <div class="cat-header">
          <div class="cat-icon book">📚</div>
          <div><div class="cat-title">영어책</div><div class="cat-sub">오늘 읽은 책을 기록해요</div></div>
          <div class="cat-arrow">›</div>
        </div>
        <div class="cat-preview" id="preview-book"></div>
      </div>
      <div class="cat-card" onclick="openModal('video', todayKey)">
        <div class="cat-header">
          <div class="cat-icon video">🎬</div>
          <div><div class="cat-title">영어 영상</div><div class="cat-sub">오늘 본 영상을 기록해요</div></div>
          <div class="cat-arrow">›</div>
        </div>
        <div class="cat-preview" id="preview-video"></div>
      </div>
      <div class="cat-card" onclick="openModal('daily', todayKey)">
        <div class="cat-header">
          <div class="cat-icon daily">🌱</div>
          <div><div class="cat-title">아이 일상</div><div class="cat-sub">소중한 순간을 담아요</div></div>
          <div class="cat-arrow">›</div>
        </div>
        <div class="cat-preview" id="preview-daily"></div>
      </div>
    </div>

  </div>

  <!-- 날짜별 -->
  <div class="section" id="tab-calendar">
    <div class="calendar-nav">
      <button class="cal-nav-btn" onclick="changeCalMonth(-1)">‹</button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-nav-btn" onclick="changeCalMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-selected-day" id="cal-selected-day"></div>
  </div>

  <!-- 항목별 -->
  <div class="section" id="tab-bycat">
    <div class="category-filter">
      <button class="filter-btn active" onclick="filterCat('all', this)">전체</button>
      <button class="filter-btn" onclick="filterCat('book', this)">📚 영어책</button>
      <button class="filter-btn" onclick="filterCat('video', this)">🎬 영상</button>
      <button class="filter-btn" onclick="filterCat('daily', this)">🌱 일상</button>
    </div>
    <div class="all-records" id="all-records"></div>
  </div>

  <!-- 한달 보고서 -->
  <div class="section" id="tab-report">
    <div class="report-tab-inner">

      <div class="report-month-nav">
        <button onclick="changeReportMonth(-1)">‹</button>
        <span class="report-month-display" id="report-month-display"></span>
        <button onclick="changeReportMonth(1)">›</button>
      </div>

      <div class="stats-row" id="report-stats"></div>

      <div class="photo-strip-section">
        <div class="section-label">이달의 사진</div>
        <div id="report-photos-inner"></div>
      </div>

      <div class="report-write-section">
        <div class="report-write-header">
          <div class="report-write-title">이달의 성장 기록</div>
          <div class="report-write-sub">항목별로 이달을 돌아보며 작성해보세요</div>
        </div>
        <div class="report-write-body">
          <div class="cat-textarea-group">
            <div class="cat-textarea-label"><span style="font-size:15px">📚</span> 영어책</div>
            <textarea class="report-textarea" id="report-textarea-book" placeholder="이달 영어책 기록을 돌아보며 적어보세요..."></textarea>
          </div>
          <div class="cat-textarea-group">
            <div class="cat-textarea-label"><span style="font-size:15px">🎬</span> 영어 영상</div>
            <textarea class="report-textarea" id="report-textarea-video" placeholder="이달 영상 기록을 돌아보며 적어보세요..."></textarea>
          </div>
          <div class="cat-textarea-group">
            <div class="cat-textarea-label"><span style="font-size:15px">🌱</span> 아이 일상</div>
            <textarea class="report-textarea" id="report-textarea-daily" placeholder="이달 아이의 성장과 특별한 순간들을 적어보세요..."></textarea>
          </div>
          <div class="report-write-actions">
            <button class="btn-clear" onclick="clearDraft()">초기화</button>
            <button class="btn-save-report" onclick="saveReport()">이달 보고서 저장</button>
          </div>
        </div>
      </div>

      <div class="saved-reports-section">
        <div class="section-label">저장된 보고서</div>
        <div id="saved-reports-list"></div>
      </div>

    </div>
  </div>

  <!-- 설정 -->
  <div class="section" id="tab-settings">
    <div class="settings-inner">

      <div class="backup-section">
        <div class="backup-header">
          <div class="backup-title">데이터 백업 / 복원</div>
          <div class="backup-sub">기기를 바꿀 때 기록을 옮겨요</div>
        </div>
        <div class="backup-body">
          <button class="backup-btn" onclick="exportData()">
            <span class="backup-btn-icon">📤</span>
            <div class="backup-btn-text">
              <div class="backup-btn-label">내보내기</div>
              <div class="backup-btn-desc">모든 기록을 파일로 저장해요</div>
            </div>
          </button>
          <label class="backup-btn import">
            <span class="backup-btn-icon">📥</span>
            <div class="backup-btn-text">
              <div class="backup-btn-label">가져오기</div>
              <div class="backup-btn-desc">백업 파일을 불러와 복원해요</div>
            </div>
            <input class="backup-input" type="file" accept=".json" onchange="importData(event)">
          </label>
        </div>
      </div>

      <div class="backup-section">
        <div class="backup-header">
          <div class="backup-title">데이터 초기화</div>
          <div class="backup-sub">모든 기록을 삭제해요. 되돌릴 수 없어요.</div>
        </div>
        <div class="backup-body">
          <button class="backup-btn" onclick="resetAllData()" style="border-color:rgba(220,50,50,0.25)">
            <span class="backup-btn-icon">🗑️</span>
            <div class="backup-btn-text">
              <div class="backup-btn-label" style="color:#c0392b">전체 데이터 삭제</div>
              <div class="backup-btn-desc">모든 기록과 보고서가 삭제돼요</div>
            </div>
          </button>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- 기록 작성 모달 -->
<div class="modal-bg" id="modal-bg" onclick="handleModalBgClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-date-label" id="modal-date-label"></div>
    <div class="photo-upload-area">
      <input type="file" accept="image/*" multiple onchange="handlePhotoSelect(event)" />
      <div style="font-size:24px;margin-bottom:6px">📷</div>
      <div style="font-size:14px;color:#666">사진 추가하기</div>
      <div style="font-size:12px;color:#aaa;margin-top:3px">여러 장 선택 가능</div>
    </div>
    <div class="photo-preview-grid" id="photo-preview-grid"></div>
    <textarea class="memo-area" id="memo-input" placeholder="메모를 입력하세요..."></textarea>
    <button class="btn-primary" onclick="saveRecord()">저장하기</button>
    <button class="btn-secondary" onclick="closeModal()">취소</button>
    <button class="btn-delete-record" id="btn-delete-record" onclick="deleteRecord()" style="display:none">이 항목 기록 삭제</button>
  </div>
</div>

<!-- 카테고리 선택 모달 -->
<div class="cat-pick-modal-bg" id="cat-pick-bg" onclick="handleCatPickBgClick(event)">
  <div class="cat-pick-modal">
    <div class="modal-handle"></div>
    <div class="cat-pick-title" id="cat-pick-title"></div>
    <div class="cat-pick-date" id="cat-pick-date-label"></div>
    <div class="cat-pick-list" id="cat-pick-list"></div>
    <button class="cat-pick-cancel" onclick="closeCatPick()">닫기</button>
  </div>
</div>

<!-- 저장된 보고서 보기 모달 -->
<div class="view-report-bg" id="view-report-bg" onclick="handleViewReportBgClick(event)">
  <div class="view-report-modal">
    <div class="modal-handle"></div>
    <div id="view-report-content"></div>
  </div>
</div>

<script>
const CATS = {
  book:  { label: '영어책', icon: '📚', bg: '#EEF2FF', badge: 'badge-book' },
  video: { label: '영어 영상',   icon: '🎬', bg: '#FEF3C7', badge: 'badge-video' },
  daily: { label: '아이 일상',   icon: '🌱', bg: '#ECFDF5', badge: 'badge-daily' }
};

let records = {};
let savedReports = {};
try { records = JSON.parse(localStorage.getItem('baby_records') || '{}'); } catch(e) {}
try { savedReports = JSON.parse(localStorage.getItem('baby_saved_reports') || '{}'); } catch(e) {}

let currentCat = null, currentDateKey = null, currentPhotos = [];
let calYear, calMonth, selectedDate = null;
let reportYear, reportMonth;
let currentFilter = 'all';

const today = new Date();
const todayKey = dateKey(today);

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function formatDate(key) {
  const [y,m,d] = key.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}
function formatMonthLabel(y, m) { return `${y}년 ${m+1}월`; }
function saveToStorage() {
  try {
    localStorage.setItem('baby_records', JSON.stringify(records));
  } catch(e) {
    try {
      const slim = {};
      Object.keys(records).forEach(dateK => {
        slim[dateK] = {};
        Object.keys(records[dateK]).forEach(cat => {
          const rec = records[dateK][cat];
          slim[dateK][cat] = { memo: rec.memo, photos: rec.photos.slice(0,1), ts: rec.ts };
        });
      });
      localStorage.setItem('baby_records', JSON.stringify(slim));
      alert('저장 공간이 부족해 사진 일부가 줄었어요. 사진 수를 줄여보세요.');
    } catch(e2) {
      alert('저장 공간이 가득 찼어요. 오래된 기록을 삭제해주세요.');
    }
  }
}
function saveReportsToStorage() {
  try { localStorage.setItem('baby_saved_reports', JSON.stringify(savedReports)); } catch(e) {}
}

function init() {
  const now = new Date();
  document.getElementById('today-display').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
  document.getElementById('today-date-label').textContent = formatDate(todayKey);
  calYear = now.getFullYear(); calMonth = now.getMonth();
  reportYear = now.getFullYear(); reportMonth = now.getMonth();
  renderTodayPreviews();
  renderCalendar();
  renderAllRecords('all');
  renderReportTab();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (btn) {
    btn.classList.add('active');
  } else {
    document.querySelectorAll('.tab').forEach(t => {
      if (t.getAttribute('onclick') && t.getAttribute('onclick').indexOf("'" + tab + "'") !== -1) {
        t.classList.add('active');
      }
    });
  }
  if (tab === 'calendar') renderCalendar();
  if (tab === 'bycat') renderAllRecords(currentFilter);
  if (tab === 'report') renderReportTab();
}

// ── 기록 모달 ──────────────────────────────────
function openModal(cat, dateK) {
  currentCat = cat; currentDateKey = dateK; currentPhotos = [];
  document.getElementById('modal-title').innerHTML = `${CATS[cat].icon} ${CATS[cat].label}`;
  document.getElementById('modal-date-label').textContent = formatDate(dateK);
  document.getElementById('memo-input').value = '';
  document.getElementById('photo-preview-grid').innerHTML = '';
  const existing = records[dateK]?.[cat];
  if (existing) {
    document.getElementById('memo-input').value = existing.memo || '';
    existing.photos.forEach(src => { currentPhotos.push(src); addPhotoThumb(src); });
  }
  const deleteBtn = document.getElementById('btn-delete-record');
  if (deleteBtn) deleteBtn.style.display = existing ? 'block' : 'none';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  currentCat = null; currentDateKey = null; currentPhotos = [];
}
function deleteRecord(skipConfirm) {
  if (!records[currentDateKey]?.[currentCat]) return;
  if (!skipConfirm && !confirm('이 항목의 기록을 삭제할까요?')) return;
  delete records[currentDateKey][currentCat];
  // 해당 날짜에 기록이 하나도 없으면 날짜 키도 삭제
  if (Object.keys(records[currentDateKey]).length === 0) {
    delete records[currentDateKey];
  }
  saveToStorage();
  closeModal();
  renderTodayPreviews();
  renderCalendar();
  if (selectedDate) renderDayPanel(selectedDate);
  renderAllRecords(currentFilter);
}
function handleModalBgClick(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }
function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function handlePhotoSelect(e) {
  Array.from(e.target.files).forEach(file => {
    compressImage(file, compressed => {
      currentPhotos.push(compressed);
      addPhotoThumb(compressed);
    });
  });
  e.target.value = '';
}
function addPhotoThumb(src) {
  const grid = document.getElementById('photo-preview-grid');
  const div = document.createElement('div'); div.className = 'photo-thumb';
  const img = document.createElement('img'); img.src = src;
  const btn = document.createElement('button'); btn.className = 'photo-remove'; btn.innerHTML = '×';
  btn.onclick = () => { const i = currentPhotos.indexOf(src); if (i>-1) currentPhotos.splice(i,1); div.remove(); };
  div.appendChild(img); div.appendChild(btn); grid.appendChild(div);
}
function saveRecord() {
  const memo = document.getElementById('memo-input').value.trim();
  if (!memo && currentPhotos.length === 0) {
    // 기존 기록이 있으면 삭제, 없으면 안내
    if (records[currentDateKey]?.[currentCat]) {
      if (!confirm('사진과 메모가 모두 비어있어요. 이 항목의 기록을 삭제할까요?')) return;
      deleteRecord(true);
    } else {
      alert('사진이나 메모를 입력해주세요.');
    }
    return;
  }
  if (!records[currentDateKey]) records[currentDateKey] = {};
  records[currentDateKey][currentCat] = { memo, photos: [...currentPhotos], ts: Date.now() };
  saveToStorage();
  closeModal();
  renderTodayPreviews();
  renderCalendar();
  if (selectedDate) renderDayPanel(selectedDate);
  renderAllRecords(currentFilter);
}

// ── 오늘 미리보기 ──────────────────────────────
function renderTodayPreviews() {
  ['book','video','daily'].forEach(cat => {
    const el = document.getElementById('preview-'+cat);
    const rec = records[todayKey]?.[cat];
    if (rec && (rec.memo || rec.photos.length > 0)) {
      el.className = 'cat-preview has-record';
      let html = '';
      if (rec.photos.length>0) html += `<div class="preview-thumb"><img src="${rec.photos[0]}" style="width:100%;height:100%;object-fit:cover;border-radius:6px"></div>`;
      if (rec.memo) html += `<div class="preview-memo">${rec.memo}</div>`;
      el.innerHTML = html;
    } else { el.className = 'cat-preview'; el.innerHTML = ''; }
  });
}

// ── 달력 ───────────────────────────────────────
function renderCalendar() {
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${monthNames[calMonth]}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth+1, 0);
  for (let i = 0; i < first.getDay(); i++) {
    const el = document.createElement('div'); el.className = 'cal-day other-month';
    const prev = new Date(calYear, calMonth, -first.getDay()+i+1);
    el.innerHTML = `<span class="day-num">${prev.getDate()}</span>`; grid.appendChild(el);
  }
  for (let d = 1; d <= last.getDate(); d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('div'); el.className = 'cal-day';
    if (key > todayKey) el.classList.add('future');
    if (key === todayKey) el.classList.add('today');
    if (selectedDate === key) el.classList.add('selected');
    el.innerHTML = `<span class="day-num">${d}</span>`;
    const dayRec = records[key];
    if (dayRec) {
      const dots = document.createElement('div'); dots.className = 'day-dots';
      if (dayRec.book)  dots.innerHTML += '<div class="dot dot-book"></div>';
      if (dayRec.video) dots.innerHTML += '<div class="dot dot-video"></div>';
      if (dayRec.daily) dots.innerHTML += '<div class="dot dot-daily"></div>';
      el.appendChild(dots);
    }
    if (key <= todayKey) el.onclick = () => selectDay(key);
    grid.appendChild(el);
  }
}
function selectDay(key) { selectedDate = key; renderCalendar(); renderDayPanel(key); }
function renderDayPanel(key) {
  const container = document.getElementById('cal-selected-day');
  const dayRec = records[key] || {};
  let html = `<div class="day-panel"><div class="day-panel-header"><span class="day-panel-title">${formatDate(key)}</span><button class="add-record-btn" onclick="openCatPick('${key}')">+ 기록 추가</button></div><div class="day-cats">`;
  ['book','video','daily'].forEach(cat => {
    const rec = dayRec[cat];
    html += `<div class="day-cat-row" onclick="openModal('${cat}','${key}')"><div class="day-cat-icon" style="background:${CATS[cat].bg}">${CATS[cat].icon}</div><div class="day-cat-info"><div class="day-cat-name">${CATS[cat].label}</div>`;
    html += rec?.memo ? `<div class="day-cat-memo">${rec.memo}</div>` : `<div class="day-cat-memo" style="color:#aaa">탭하여 기록 추가</div>`;
    html += `</div>`;
    if (rec?.photos?.length > 0) html += `<img class="day-cat-thumb" src="${rec.photos[0]}">`;
    html += `<span class="day-cat-status${rec?' done':''}">${rec?'✓':'+'}</span></div>`;
  });
  html += `</div></div>`;
  container.innerHTML = html;
}
function changeCalMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  selectedDate = null;
  document.getElementById('cal-selected-day').innerHTML = '';
  renderCalendar();
}

// ── 카테고리 선택 모달 ────────────────────────
function openCatPick(dateK) {
  document.getElementById('cat-pick-title').textContent = '어떤 항목을 기록할까요?';
  document.getElementById('cat-pick-date-label').textContent = formatDate(dateK);
  const list = document.getElementById('cat-pick-list');
  const dayRec = records[dateK] || {};
  list.innerHTML = Object.entries(CATS).map(([cat, info]) => {
    const done = !!dayRec[cat];
    return `<div class="cat-pick-item" onclick="pickCat('${cat}','${dateK}')"><div class="cpi-icon" style="background:${info.bg}">${info.icon}</div><span class="cpi-label">${info.label}</span><span class="cpi-status" style="color:${done?'#10B981':'#aaa'}">${done?'✓ 기록됨':'미기록'}</span></div>`;
  }).join('');
  document.getElementById('cat-pick-bg').classList.add('open');
}
function closeCatPick() { document.getElementById('cat-pick-bg').classList.remove('open'); }
function handleCatPickBgClick(e) { if (e.target === document.getElementById('cat-pick-bg')) closeCatPick(); }
function pickCat(cat, dateK) { closeCatPick(); openModal(cat, dateK); }

// ── 항목별 ────────────────────────────────────
function filterCat(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAllRecords(cat);
}
function renderAllRecords(filter) {
  const container = document.getElementById('all-records');
  const entries = [];
  Object.keys(records).sort().reverse().forEach(dateK => {
    ['book','video','daily'].forEach(cat => {
      if ((filter==='all'||filter===cat) && records[dateK][cat]) entries.push({date:dateK, cat, rec:records[dateK][cat]});
    });
  });
  if (!entries.length) { container.innerHTML = '<div class="empty-state">아직 기록이 없어요.<br>오늘 첫 기록을 남겨보세요!</div>'; return; }
  container.innerHTML = entries.map(({date,cat,rec}) => `
    <div class="all-record-card">
      <div class="arc-header"><span class="record-cat-badge ${CATS[cat].badge}">${CATS[cat].icon} ${CATS[cat].label}</span><span class="arc-date">${formatDate(date)}</span></div>
      ${rec.memo?`<div class="arc-memo">${rec.memo}</div>`:''}
      ${rec.photos.length>0?`<div class="arc-photos">${rec.photos.slice(0,4).map(p=>`<img class="arc-photo" src="${p}">`).join('')}</div>`:''}
    </div>`).join('');
}

// ── 한달 보고서 ───────────────────────────────
function changeReportMonth(dir) {
  reportMonth += dir;
  if (reportMonth < 0) { reportMonth = 11; reportYear--; }
  if (reportMonth > 11) { reportMonth = 0; reportYear++; }
  renderReportTab();
}

function getMonthRecords(y, m) {
  const prefix = `${y}-${String(m+1).padStart(2,'0')}`;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const result = {};
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${prefix}-${String(d).padStart(2,'0')}`;
    if (records[key]) result[key] = records[key];
  }
  return result;
}

function renderReportTab() {
  document.getElementById('report-month-display').textContent = formatMonthLabel(reportYear, reportMonth);

  const monthRecs = getMonthRecords(reportYear, reportMonth);
  const daysInMonth = new Date(reportYear, reportMonth+1, 0).getDate();
  const counts = { book: 0, video: 0, daily: 0 };
  const allPhotos = [];

  Object.values(monthRecs).forEach(dayRec => {
    ['book','video','daily'].forEach(cat => {
      if (dayRec[cat]) {
        counts[cat]++;
        dayRec[cat].photos.forEach(p => allPhotos.push(p));
      }
    });
  });

  // 통계
  const statsEl = document.getElementById('report-stats');
  statsEl.innerHTML = ['book','video','daily'].map(cat => {
    const pct = Math.round((counts[cat] / daysInMonth) * 100);
    const barClass = { book:'bar-book', video:'bar-video', daily:'bar-daily' }[cat];
    return `<div class="stat-card">
      <div class="stat-icon">${CATS[cat].icon}</div>
      <div class="stat-count">${counts[cat]}</div>
      <div class="stat-label">${CATS[cat].label.replace('영어 ','')}<br>인증일</div>
      <div class="stat-bar-wrap"><div class="stat-bar ${barClass}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // 항목별 사진
  const photosInner = document.getElementById('report-photos-inner');
  const photosByCat = { book: [], video: [], daily: [] };
  Object.values(monthRecs).forEach(dayRec => {
    ['book','video','daily'].forEach(cat => {
      if (dayRec[cat]) dayRec[cat].photos.forEach(p => photosByCat[cat].push(p));
    });
  });
  const catDotClass = { book:'dot-c-book', video:'dot-c-video', daily:'dot-c-daily' };
  const hasAnyPhoto = ['book','video','daily'].some(c => photosByCat[c].length > 0);
  if (hasAnyPhoto) {
    photosInner.innerHTML = ['book','video','daily'].filter(c => photosByCat[c].length > 0).map(cat =>
      `<div class="cat-photo-group">
        <div class="cat-photo-label"><div class="cat-photo-label-dot ${catDotClass[cat]}"></div>${CATS[cat].icon} ${CATS[cat].label}</div>
        <div class="photo-strip">${photosByCat[cat].slice(0,20).map(p=>`<img class="strip-photo" src="${p}">`).join('')}</div>
      </div>`
    ).join('');
  } else {
    photosInner.innerHTML = '<div class="photos-all-empty">이달 등록된 사진이 없어요</div>';
  }

  // 보고서 텍스트 — 저장된 내용이 있으면 불러오기
  const mk = monthKey(reportYear, reportMonth);
  const existing = savedReports[mk];
  ['book','video','daily'].forEach(cat => {
    const el = document.getElementById('report-textarea-' + cat);
    if (el) el.value = (existing && existing.texts && existing.texts[cat]) ? existing.texts[cat] : '';
  });

  renderSavedReportsList();
}

function clearDraft() {
  if (confirm('작성 중인 내용을 지울까요?')) {
    ['book','video','daily'].forEach(cat => {
      const el = document.getElementById('report-textarea-' + cat);
      if (el) el.value = '';
    });
  }
}

function saveReport() {
  const texts = {};
  ['book','video','daily'].forEach(cat => {
    const el = document.getElementById('report-textarea-' + cat);
    texts[cat] = el ? el.value.trim() : '';
  });
  const hasAny = Object.values(texts).some(t => t.length > 0);
  if (!hasAny) { alert('보고서 내용을 입력해주세요.'); return; }

  const monthRecs = getMonthRecords(reportYear, reportMonth);
  const counts = { book: 0, video: 0, daily: 0 };
  const allPhotos = [];
  Object.values(monthRecs).forEach(dayRec => {
    ['book','video','daily'].forEach(cat => {
      if (dayRec[cat]) {
        counts[cat]++;
        dayRec[cat].photos.slice(0,2).forEach(p => allPhotos.push(p));
      }
    });
  });

  const mk = monthKey(reportYear, reportMonth);
  savedReports[mk] = {
    label: formatMonthLabel(reportYear, reportMonth),
    texts,
    counts,
    photos: allPhotos.slice(0,9),
    recordDays: Object.keys(monthRecs).length,
    savedAt: Date.now()
  };
  saveReportsToStorage();
  renderSavedReportsList();
  alert('보고서가 저장되었어요!');
}

function renderSavedReportsList() {
  const container = document.getElementById('saved-reports-list');
  const keys = Object.keys(savedReports).sort().reverse();
  if (!keys.length) {
    container.innerHTML = '<div class="saved-empty">아직 저장된 보고서가 없어요</div>'; return;
  }
  container.innerHTML = keys.map(mk => {
    const r = savedReports[mk];
    const d = new Date(r.savedAt);
    const savedStr = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} 저장`;
    return `<div class="saved-report-item" onclick="viewReport('${mk}')">
      <div class="sri-left">
        <div class="sri-month">${r.label}</div>
        <div class="sri-meta">📚 ${r.counts.book}일 · 🎬 ${r.counts.video}일 · 🌱 ${r.counts.daily}일 &nbsp;·&nbsp; ${savedStr}</div>
      </div>
      <span class="sri-arrow">›</span>
    </div>`;
  }).join('');
}

function viewReport(mk) {
  const r = savedReports[mk];
  if (!r) return;
  const d = new Date(r.savedAt);
  const savedStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 저장`;
  let html = `
    <div class="vr-title">${r.label} 보고서</div>
    <div class="vr-saved-at">${savedStr}</div>
    <div class="vr-stats">
      <div class="vr-stat"><div class="vr-stat-count">${r.counts.book}</div><div class="vr-stat-label">📚 영어책</div></div>
      <div class="vr-stat"><div class="vr-stat-count">${r.counts.video}</div><div class="vr-stat-label">🎬 영상</div></div>
      <div class="vr-stat"><div class="vr-stat-count">${r.counts.daily}</div><div class="vr-stat-label">🌱 일상</div></div>
    </div>`;
  if (r.photos && r.photos.length > 0) {
    html += `<div class="vr-photos">${r.photos.map(p=>`<img class="vr-photo" src="${p}">`).join('')}</div>`;
  }
  const catTexts = r.texts || { book: r.text || '', video: '', daily: '' };
  const textHtml = ['book','video','daily'].filter(c => catTexts[c] && catTexts[c].trim()).map(cat =>
    `<div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:500;color:#888;margin-bottom:6px">${CATS[cat].icon} ${CATS[cat].label}</div>
      <div class="vr-report-text" style="margin-bottom:0">${catTexts[cat]}</div>
    </div>`
  ).join('');
  html += textHtml || '<div class="vr-report-text">내용 없음</div>';
  html += `
    <button class="vr-edit-btn" onclick="editReport('${mk}')">✏️ 수정하기</button>
    <button class="vr-edit-btn" style="background:#EEF2FF;border-color:rgba(65,56,185,0.2);color:#4338CA" onclick="printReport('${mk}')">📄 PDF로 저장</button>
    <button class="vr-close" onclick="closeViewReport()">닫기</button>
    <button class="vr-delete" onclick="deleteReport('${mk}')">보고서 삭제</button>`;
  document.getElementById('view-report-content').innerHTML = html;
  document.getElementById('view-report-bg').classList.add('open');
}

function editReport(mk) {
  closeViewReport();
  // 해당 월로 이동 후 텍스트 불러오기
  const [y, m] = mk.split('-').map(Number);
  reportYear = y; reportMonth = m - 1;
  renderReportTab();
  // 저장된 텍스트 로드 (renderReportTab 이후)
  const editMk = monthKey(reportYear, reportMonth);
  const editExisting = savedReports[editMk];
  if (editExisting && editExisting.texts) {
    ['book','video','daily'].forEach(cat => {
      const el = document.getElementById('report-textarea-' + cat);
      if (el) el.value = editExisting.texts[cat] || '';
    });
  }
  // 보고서 탭으로 전환
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-report').classList.add('active');
  document.querySelectorAll('.tab').forEach(t => { if (t.getAttribute('onclick') && t.getAttribute('onclick').indexOf('report') !== -1) t.classList.add('active'); });
  // 스크롤을 작성 영역으로
  setTimeout(() => {
    document.getElementById('report-textarea').scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.getElementById('report-textarea').focus();
  }, 100);
}

function closeViewReport() { document.getElementById('view-report-bg').classList.remove('open'); }
function handleViewReportBgClick(e) { if (e.target === document.getElementById('view-report-bg')) closeViewReport(); }
function deleteReport(mk) {
  if (!confirm('이 보고서를 삭제할까요?')) return;
  delete savedReports[mk];
  saveReportsToStorage();
  closeViewReport();
  renderSavedReportsList();
}


// ── 백업 / 복원 ────────────────────────────────

function resetAllData() {
  if (!confirm('정말 모든 기록을 삭제할까요?\n이 작업은 되돌릴 수 없어요.')) return;
  if (!confirm('마지막 확인이에요. 정말 삭제할까요?')) return;
  records = {};
  savedReports = {};
  saveToStorage();
  saveReportsToStorage();
  renderTodayPreviews();
  renderCalendar();
  renderAllRecords(currentFilter);
  renderReportTab();
  alert('모든 데이터가 삭제됐어요.');
}


// ── PDF 저장 ────────────────────────────────
function printReport(mk) {
  const r = savedReports[mk];
  if (!r) return;

  const catTexts = r.texts || { book: r.text || '', video: '', daily: '' };
  const catInfo = {
    book:  { icon: '📚', label: '영어책', dot: '#818CF8' },
    video: { icon: '🎬', label: '영어 영상',   dot: '#F59E0B' },
    daily: { icon: '🌱', label: '아이 일상',   dot: '#10B981' }
  };

  // 통계
  const statsHtml = ['book','video','daily'].map(cat => `
    <div class="print-stat">
      <div style="font-size:18px;margin-bottom:2px">${catInfo[cat].icon}</div>
      <div class="print-stat-count">${r.counts[cat]}</div>
      <div class="print-stat-label">${catInfo[cat].label.replace('영어 ','')}<br>인증일</div>
    </div>`).join('');

  // 사진 — 항목별
  const photosByCat = { book: [], video: [], daily: [] };
  if (r.photos && r.photos.length) {
    // 저장된 photos는 혼합 배열이라 전체 출력
    photosByCat._all = r.photos;
  }
  // 이달 실제 기록에서 항목별 사진 재구성
  const mk_year = parseInt(mk.split('-')[0]);
  const mk_month = parseInt(mk.split('-')[1]) - 1;
  const monthRecs = getMonthRecords(mk_year, mk_month);
  Object.values(monthRecs).forEach(dayRec => {
    ['book','video','daily'].forEach(cat => {
      if (dayRec[cat]) dayRec[cat].photos.slice(0,5).forEach(p => {
        if (photosByCat[cat].length < 10) photosByCat[cat].push(p);
      });
    });
  });
  const hasPhotoByCat = ['book','video','daily'].some(c => photosByCat[c].length > 0);
  let photosHtml = '';
  if (hasPhotoByCat) {
    photosHtml = `<div class="print-photos-section">
      <div class="print-photos-label">이달의 사진</div>
      ${['book','video','daily'].filter(c => photosByCat[c].length > 0).map(cat =>
        `<div class="print-cat-photo-group">
          <div class="print-cat-label">${catInfo[cat].icon} ${catInfo[cat].label}</div>
          <div class="print-photos-grid">${photosByCat[cat].map(p => `<img class="print-photo" src="${p}">`).join('')}</div>
        </div>`
      ).join('')}
    </div>`;
  }

  // 텍스트 — 항목별
  const textsHtml = ['book','video','daily'].filter(c => catTexts[c] && catTexts[c].trim()).map(cat =>
    `<div class="print-cat-text-group">
      <div class="print-cat-text-label">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${catInfo[cat].dot}"></span>
        ${catInfo[cat].icon} ${catInfo[cat].label}
      </div>
      <div class="print-cat-text-body">${catTexts[cat]}</div>
    </div>`
  ).join('');

  const savedD = new Date(r.savedAt);
  const savedStr = `${savedD.getFullYear()}년 ${savedD.getMonth()+1}월 ${savedD.getDate()}일 저장`;

  // 인쇄용 페이지 생성
  let printDiv = document.getElementById('print-area');
  if (!printDiv) {
    printDiv = document.createElement('div');
    printDiv.id = 'print-area';
    printDiv.className = 'print-page';
    document.body.appendChild(printDiv);
  }
  printDiv.innerHTML = `
    <div class="print-header">
      <div class="print-title">${r.label} 성장 기록</div>
      <div class="print-meta">${savedStr}</div>
    </div>
    <div class="print-stats-row">${statsHtml}</div>
    ${photosHtml}
    ${textsHtml ? `<div class="print-texts-section"><div class="print-texts-label">이달의 성장 기록</div>${textsHtml}</div>` : ''}
    <div class="print-footer">아이 성장 기록 · ${r.label}</div>
  `;

  // 인쇄 실행 (모바일 호환 — 사용자 클릭 컨텍스트 유지)
  closeViewReport();
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.print();
    });
  });
}

function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    records: records,
    savedReports: savedReports
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const label = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `아이성장기록_백업_${label}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.records) { alert('올바른 백업 파일이 아니에요.'); return; }
      const existing = Object.keys(records).length + Object.keys(savedReports).length;
      const msg = existing > 0
        ? '현재 기기의 기록에 백업 데이터를 합칠까요?\n(같은 날짜는 백업 파일 내용으로 덮어써요)'
        : '백업 파일을 불러올까요?';
      if (!confirm(msg)) return;
      // 병합
      Object.keys(data.records || {}).forEach(dateK => {
        if (!records[dateK]) records[dateK] = {};
        Object.assign(records[dateK], data.records[dateK]);
      });
      Object.keys(data.savedReports || {}).forEach(mk => {
        savedReports[mk] = data.savedReports[mk];
      });
      saveToStorage();
      saveReportsToStorage();
      renderTodayPreviews();
      renderCalendar();
      renderAllRecords(currentFilter);
      renderReportTab();
      alert('불러오기 완료! 기록이 복원됐어요.');
    } catch(err) {
      alert('파일을 읽는 중 오류가 생겼어요. 올바른 백업 파일인지 확인해주세요.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

init();
</script>
